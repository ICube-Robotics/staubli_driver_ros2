# GitHub Actions CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

name: Docker

on:
  push:
    tags:
      - '*'

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: ghcr.io/icube-robotics/staubli_driver_ros2:${{ github.ref_name }}
          # Pass build arguments:
          build-args: |
            ROS_DISTRO=jazzy
